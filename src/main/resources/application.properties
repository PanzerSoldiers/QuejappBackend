spring.application.name=quejapi

# ====================================
# MONGODB CONFIGURATIONS
# ====================================

spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/quejappdb}

#mongodb+srv://AlexanderChiquillo:MongoDb2801@cluster0.up4knkr.mongodb.net/?appName=Cluster0
# Enable indexes creation to make unique fields
spring.data.mongodb.auto-index-creation=true

# ====================================
# SERVER CONFIGURATION
# ====================================
server.port=${PORT:8080}

# ====================================
# SPRING PROFILES
# ====================================
spring.profiles.active=${SPRING_PROFILE:prod}
# ====================================
# EXCLUIR AUTO-CONFIGURACIONES DE JPA
# ====================================
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration
